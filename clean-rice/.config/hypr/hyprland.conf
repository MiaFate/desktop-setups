# --- CONFIGURACIÓN LIMPIA ---

# 1. Monitores (Cargados desde nwg-displays)
source = ~/.config/hypr/monitors.conf

# 2. Programas por defecto
$terminal = kitty
$menu = rofi -show drun

# 3. Autostart (Aquí es donde arrancarás Quickshell y Wallust luego)

# Aplicar el tema de Wallust y el wallpaper al arrancar
# (Ajusta la ruta a un wallpaper que tengas en tu carpeta de wallpapers)
exec-once = wallust run ~/dotfiles/clean-rice/wallpapers/default.jpg
# Arrancar la interfaz de Quickshell
exec-once = quickshell
# Notificaciones y Applets de sistema (opcional pero recomendado)
exec-once = nm-applet --indicator
exec-once = blueman-applet
# Configuración de GTK (iconos, cursor, etc)
exec-once = nwg-look -a

# 4. Colores de Wallust (la conexión con el resto del rice)
source = ~/.config/hypr/wallust/wallust-hyprland.conf

# 5. Estética básica (Gaps y Bordes)
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $color11  # Variable de Wallust
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 10
}

# 6. Binds (Lo mínimo para no quedarte atrapado)
$mainMod = SUPER
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, Q, killactive,
bind = $mainMod, P, exit, 
# Recarga manual de la configuración
bind = $mainMod SHIFT, R, exec, hyprctl reload


# --- FIN ---

