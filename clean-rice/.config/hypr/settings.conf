# --- SETTINGS & ESTÉTICA ---

general {
    gaps_in = 2
    gaps_out = 8
    border_size = 2
    col.active_border = $color11  # Variable de Wallust
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

input {
    kb_layout = us
    kb_variant = 
    kb_model = 
    kb_options = 
    kb_rules = 

    repeat_rate = 50
    repeat_delay = 300

    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
