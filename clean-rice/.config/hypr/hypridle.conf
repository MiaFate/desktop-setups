general {
    lock_cmd = pidof hyprlock || hyprlock       # Comando para bloquear
    before_sleep_cmd = loginctl lock-session    # Bloquear antes de suspender
    after_sleep_cmd = hyprctl dispatch dpms on  # Encender monitores al despertar
}

listener {
    timeout = 300                                # 5 minutos
    on-timeout = loginctl lock-session           # Bloquear pantalla
}

listener {
    timeout = 330                                # 5.5 minutos
    on-timeout = hyprctl dispatch dpms off       # Apagar monitores
    on-resume = hyprctl dispatch dpms on         # Encender al volver
}

listener {
    timeout = 1800                               # 30 minutos
    on-timeout = systemctl suspend               # Suspender PC
}
